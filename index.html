<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SƠN PREMIUM ORDER</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 20px;
      background-color: #f9f9f9;
    }
    h2{
      text-align:center;
      color:#111;
      margin-bottom:30px;
      font-size:28px;
      font-weight:700;
    }
    .input-field {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button.generate{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#111;
      color:white;
      font-size:17px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }
    button.generate:hover{
      background:#e53935;
      transform:translateY(-2px);
    }
    button.generate:disabled {
      background-color: #f8aa9a;
      cursor: not-allowed;
    }
    .result {
      margin-top: 25px;
    }
    .result-label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      resize: none;
    }
    button.copy{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#444;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }
    button.copy:hover{
      background:#111;
    }
    .small {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
    .note {
      background-color: #fff3cd;
      color: #856404;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-right: 8px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <h2>HOÀN TIỀN MUA SẮM SPO</h2>
  <div class="note" id="note">
    <strong>Note:</strong> Dán link Shopee (link đầy đủ hoặc link ngắn)
  </div>
  
  <input type="hidden" id="affiliateIdNumber" value="17340760181">

  <div class="input-field">
    <label for="username">Tên đăng nhập:</label>
    <input type="text" id="username" placeholder="Nhập tên đăng nhập">
  </div>

  <div class="input-field">
    <label for="inputLink">Shopee Link:</label>
    <input type="text" id="inputLink" placeholder="Dán link Shopee ở đây">
  </div>

  <button class="generate" id="generateButton" onclick="generateLink()">Chuyển Đổi</button> 

  <div class="result">
    <div class="result-label">Link Affiliate:</div>
    <textarea id="resultLink" readonly></textarea>
    <button class="copy" onclick="buyNow()">🛒 MUA NGAY</button>
    <p class="small" id="copyStatus"></p>
  </div>

  <script>
    let realAffiliateLink = "";

    function encodeURL(url) {
      return encodeURIComponent(url);
    }

    function getCleanBaseURL(url) {
      return url.split('?')[0];
    }

    function generateLink() {
      const input = document.getElementById('inputLink').value.trim();
      const affiliateId = document.getElementById('affiliateIdNumber').value.trim();
      const username = document.getElementById('username').value.trim();
      const resultArea = document.getElementById('resultLink');
      const copyStatus = document.getElementById('copyStatus');
      const generateButton = document.getElementById('generateButton');

      if (!input || !affiliateId || !username) {
        alert('Vui lòng điền đầy đủ thông tin');
        return;
      }

      // Show loading indicator
      generateButton.disabled = true;
      const originalButtonText = generateButton.innerHTML;
      generateButton.innerHTML = '<span class="loader"></span> Processing...';

      try {
        let finalUrl = input;

        // Get clean base URL without any parameters
        finalUrl = getCleanBaseURL(finalUrl);

        const encoded = encodeURL(finalUrl);

        const finalLink = `https://s.shopee.sg/an_redir?origin_link=${encoded}&affiliate_id=${affiliateId}&sub_id=${encodeURIComponent(username)}`;

        // Lưu link thật
        realAffiliateLink = finalLink;

        // Hiển thị link đã che
        resultArea.value = finalLink;

        copyStatus.textContent = "✅ Link được tạo thành công!";

      } catch (err) {
        console.error(err);
        alert('Lỗi: ' + err.message);
      } finally {
        // Restore button state
        generateButton.innerHTML = originalButtonText;
        generateButton.disabled = false;
      }
    }

    function buyNow() {
      if (!realAffiliateLink) {
        alert("Vui lòng chuyển đổi link trước.");
        return;
      }
      window.open(realAffiliateLink, "_blank");
    }
  </script>
</body>
</html>
